<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoJobHub 汽车招聘聚合</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

header{
    background:#1677ff;
    color:white;
    text-align:center;
    padding:30px;
}

input{
    width:60%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-top:20px;
    font-size:16px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    margin-top:30px;
}

.company{
    background:white;
    margin:15px 0;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

button{
    background:#1677ff;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0958d9;
}

</style>

</head>

<body>

<header>

<h1>🚗 AutoJobHub</h1>

<p>汽车电子｜新能源｜嵌入式招聘聚合</p>

<input placeholder="搜索企业（例如：比亚迪）">

</header>

<div class="container">

<div class="company">
<h2>比亚迪</h2>
<p>新能源汽车领导企业</p>
<a href="https://job.byd.com" target="_blank">
<button>官网投递</button>
</a>
</div>

<div class="company">
<h2>华为</h2>
<p>智能汽车解决方案</p>
<a href="https://career.huawei.com" target="_blank">
<button>官网投递</button>
</a>
</div>

<div class="company">
<h2>理想汽车</h2>
<p>智能电动车</p>
<a href="https://job.lixiang.com" target="_blank">
<button>官网投递</button>
</a>
</div>

</div>

   <script>
// 1. 声明一个全局变量，用来存所有从 data.json 拿到的企业数据
let allCompanies = [];

// 2. 页面一加载，就去读取 data.json
document.addEventListener('DOMContentLoaded', () => {
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            allCompanies = data; // 把数据存起来
            renderCompanies(allCompanies); // 首次渲染全部企业
        })
        .catch(error => console.error('读取数据失败:', error));
        
    // 🔍 已经精准对齐你的输入框：.search-bar input
    const searchInput = document.querySelector('.search-bar input');
    if(searchInput) {
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.trim().toLowerCase();
            filterCompanies(keyword);
        });
    }
});

// 3. 负责把数据变成网页格子的函数
function renderCompanies(companiesList) {
    // 📦 已经精准对齐你的大盒子：.companies
    const container = document.querySelector('.companies');
    if (!container) return;
    
    // 清空旧的静态内容
    container.innerHTML = '';
    
    // 循环数据，生成新的格子
    companiesList.forEach(company => {
        const card = document.createElement('div');
        card.className = 'company-card'; // 配合你原有的 CSS 样式
        
        // 生成标签的 HTML
        const tagsHtml = company.tags.map(tag => `<span class="tag" onclick="filterCompanies('${tag.toLowerCase()}')">${tag}</span>`).join('');
        
        card.innerHTML = `
            <h3>${company.name}</h3>
            <p class="category">${company.category}</p>
            <div class="tags">${tagsHtml}</div>
            <a href="${company.url}" target="_blank" class="btn">官网投递</a>
        `;
        container.appendChild(card);
    });
}

// 4. 负责搜索和关键词过滤的函数
function filterCompanies(keyword) {
    if (!keyword) {
        renderCompanies(allCompanies); // 如果没有输入，显示全部
        return;
    }
    const filtered = allCompanies.filter(company => {
        const matchName = company.name.toLowerCase().includes(keyword);
        const matchCategory = company.category.toLowerCase().includes(keyword);
        const matchTags = company.tags.some(tag => tag.toLowerCase().includes(keyword));
        return matchName || matchCategory || matchTags;
    });
    renderCompanies(filtered);
}
</script>
</body>

</html>
