<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoJobHub 汽车招聘聚合</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

header{
    background:#1677ff;
    color:white;
    text-align:center;
    padding:30px;
}

input{
    width:60%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-top:20px;
    font-size:16px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    margin-top:30px;
}

.company{
    background:white;
    margin:15px 0;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

button{
    background:#1677ff;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0958d9;
}

</style>

</head>

<body>

<header>

<h1>🚗 AutoJobHub</h1>

<p>汽车电子｜新能源｜嵌入式招聘聚合</p>

<input placeholder="搜索企业（例如：比亚迪）">

</header>

<div class="container">

<div class="company">
<h2>比亚迪</h2>
<p>新能源汽车领导企业</p>
<a href="https://job.byd.com" target="_blank">
<button>官网投递</button>
</a>
</div>

<div class="company">
<h2>华为</h2>
<p>智能汽车解决方案</p>
<a href="https://career.huawei.com" target="_blank">
<button>官网投递</button>
</a>
</div>

<div class="company">
<h2>理想汽车</h2>
<p>智能电动车</p>
<a href="https://job.lixiang.com" target="_blank">
<button>官网投递</button>
</a>
</div>

</div>

</body>

</html>
